# ShieldAI (EDYSOR) — Production Docker Compose
# All service images are pinned to the same version as the dev compose.
# Secrets are injected via environment variables (sourced from Vault AppRole at deploy time).
# L1: Postgres pinned to 16-alpine (matching dev compose)
# L2: All feature-matrix services included

version: '3.8'

services:
  # -----------------------------------------------------------------------
  # Application tier
  # -----------------------------------------------------------------------
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/shieldai-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT_STORAGE_URI=redis://redis:6379
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
      - EVENT_BUS_BACKEND=kafka
      - QDRANT_HOST=qdrant
      - CLICKHOUSE_HOST=clickhouse
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/shieldai-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: python -m app.workers
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
      - EVENT_BUS_BACKEND=kafka
    depends_on:
      - kafka
      - postgres

  ai-layer:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/shieldai-ai:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - QDRANT_HOST=qdrant
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_ROLE_ID=${VAULT_ROLE_ID_AI}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID_AI}
    depends_on:
      - kafka
      - qdrant
      - neo4j

  siem-worker:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/shieldai-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: python -m app.siem_worker
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_URL=${DATABASE_URL}
      - EVENT_BUS_BACKEND=kafka
    depends_on:
      - kafka

  # -----------------------------------------------------------------------
  # Data stores
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine  # L1: pinned to 16 matching dev compose
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-shieldai}
      - POSTGRES_USER=${POSTGRES_USER:-shieldai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shieldai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5.12
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:v1.7.4
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  # -----------------------------------------------------------------------
  # Messaging
  # -----------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
    volumes:
      - kafka_data:/var/lib/kafka/data

  # -----------------------------------------------------------------------
  # Secrets
  # -----------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.15
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault-config.hcl
    volumes:
      - vault_data:/vault/data
      - ./vault/vault-config.hcl:/vault/config/vault-config.hcl:ro
      - vault_tls:/vault/tls:ro
    ports:
      - "8200:8200"
    environment:
      - VAULT_ADDR=https://vault:8200

  # -----------------------------------------------------------------------
  # Observability
  # -----------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:10.2.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # M6: Credentials sourced from env — never hardcoded defaults
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro

  jaeger:
    image: jaegertracing/all-in-one:1.52
    restart: unless-stopped
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # -----------------------------------------------------------------------
  # Honeypots (threat intel collection)
  # -----------------------------------------------------------------------
  cowrie:
    image: cowrie/cowrie:latest
    restart: unless-stopped
    ports:
      - "2222:2222"
      - "2223:2223"
    volumes:
      - cowrie_data:/cowrie/var

  # -----------------------------------------------------------------------
  # Volumes
  # -----------------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  qdrant_data:
  clickhouse_data:
  kafka_data:
  vault_data:
  vault_tls:
  prometheus_data:
  grafana_data:
  cowrie_data:
