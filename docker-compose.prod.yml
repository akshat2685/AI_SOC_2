version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend-prod
    container_name: shieldai_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SOAR_API_KEY=${SOAR_API_KEY}
      - SOAR_API_ENDPOINT=${SOAR_API_ENDPOINT}
      - SECRET_KEY=${SECRET_KEY}
      - AUDIT_SECRET_KEY=${AUDIT_SECRET_KEY}
    depends_on:
      - postgres
      - kafka

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker-prod
    container_name: shieldai_worker
    restart: always
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SOAR_API_KEY=${SOAR_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - AUDIT_SECRET_KEY=${AUDIT_SECRET_KEY}
    depends_on:
      - backend
      - kafka

  postgres:
    image: postgres:15-alpine
    container_name: shieldai_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soc_db}
      POSTGRES_USER: ${POSTGRES_USER:-soc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: shieldai_kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: shieldai_clickhouse
    restart: always
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

volumes:
  postgres_data:
  clickhouse_data:
