name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements.memory.txt
          pip install -r intelligence_engine/requirements.txt
          pip install boto3 pytest pytest-asyncio pytest-cov httpx slowapi python-json-logger structlog alembic

      - name: Run Pytest Suite
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test_gemini_key' }}
          SOAR_API_KEY: ${{ secrets.SOAR_API_KEY || 'test_soar_key' }}
          SOAR_API_ENDPOINT: "https://api.test.example.com/v1/containment"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          EVENT_BUS_BACKEND: stub
          RATE_LIMIT_STORAGE_URI: memory://
        run: |
          python -m pytest tests/ --cov=backend/app --cov=intelligence_engine --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  cloud-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: shieldai-cluster

      - name: Build and Load Docker Images
        run: |
          docker build -t shieldai/backend:ci -f Dockerfile.backend-prod .
          docker build -t shieldai/frontend:ci ./frontend
          kind load docker-image shieldai/backend:ci --name shieldai-cluster
          kind load docker-image shieldai/frontend:ci --name shieldai-cluster

      - name: Run Smoke Test on Cluster
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide
