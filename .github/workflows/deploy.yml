name: ShieldAI — Deploy

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/shieldai

jobs:
  test:
    name: Run test suite
    uses: ./.github/workflows/ci.yml

  build-push:
    name: Build & push Docker images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend,${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-backend:${{ steps.meta.outputs.version }}
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.meta.outputs.version }}

  security-scan:
    name: Trivy vulnerability scan
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-backend:${{ needs.build-push.outputs.image_tag }}
          format: table
          exit-code: '1'
          severity: CRITICAL

  deploy-staging:
    name: Deploy to staging
    needs: [build-push, security-scan]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.shieldai.internal
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "deploy@${DEPLOY_HOST}" \
            "cd /opt/shieldai && \
             IMAGE_TAG=${IMAGE_TAG} docker compose -f docker-compose.prod.yml pull && \
             IMAGE_TAG=${IMAGE_TAG} docker compose -f docker-compose.prod.yml up -d --remove-orphans"
      - name: Post-deploy health check
        env:
          STAGING_URL: https://staging.shieldai.internal
        run: |
          for i in $(seq 1 10); do
            curl -sf "${STAGING_URL}/health" && echo "Healthy on attempt $i" && exit 0
            echo "Attempt $i/10 failed, waiting 15s..." && sleep 15
          done
          echo "Health check failed — triggering rollback" && exit 1
      - name: Rollback on failure
        if: failure()
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "deploy@${DEPLOY_HOST}" \
            "cd /opt/shieldai && docker compose -f docker-compose.prod.yml rollout previous backend frontend"

  notify:
    name: Notify team
    needs: deploy-staging
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          [ "${{ needs.deploy-staging.result }}" = "success" ] \
            && echo "ShieldAI ${{ github.ref_name }} deployed successfully" \
            || echo "ShieldAI ${{ github.ref_name }} deployment FAILED"
